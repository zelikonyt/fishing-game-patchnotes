name: Post Patch Notes to Discord

on:
  push:
    paths:
      - 'PatchNotes.txt'

jobs:
  post-to-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(head -n 1 PatchNotes.txt)
          CONTENT=$(tail -n +2 PatchNotes.txt)

          PAYLOAD=$(jq -n \
            --arg title "🎣 Fishing Game Update - $DATE" \
            --arg desc "$CONTENT" \
            '{embeds: [{title: $title, description: $desc, color: 5016756, footer: {text: "Fishing Game"}}]}')

          # Check if a last_message.txt exists with a stored message ID and date
          if [ -f last_message.txt ]; then
            LAST_ID=$(sed -n '1p' last_message.txt)
            LAST_DATE=$(sed -n '2p' last_message.txt)

            # If same date, delete the old message first
            if [ "$LAST_DATE" = "$DATE" ]; then
              echo "Same date found, deleting old message..."
              curl -s -X DELETE "${DISCORD_WEBHOOK}/messages/${LAST_ID}"
            fi
          fi

          # Post new message and capture the message ID
          echo "Posting new message..."
          RESPONSE=$(curl -s -X POST "${DISCORD_WEBHOOK}?wait=true" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Response: $RESPONSE"
          NEW_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "New message ID: $NEW_ID"

          # Save new message ID and date to last_message.txt
          echo "$NEW_ID" > last_message.txt
          echo "$DATE" >> last_message.txt

          # Commit last_message.txt back to repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_message.txt
          git commit -m "Update last message ID"
          git push
