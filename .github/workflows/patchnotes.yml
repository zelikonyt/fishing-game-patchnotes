name: Post Patch Notes to Discord

on:
  push:
    paths:
      - 'PatchNotes.txt'

jobs:
  post-to-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          DATE=$(head -n 1 PatchNotes.txt)
          CONTENT=$(tail -n +2 PatchNotes.txt)
          
          JSON=$(jq -n \
            --arg title "🎣 Fishing Game Update - $DATE" \
            --arg desc "$CONTENT" \
            '{embeds: [{title: $title, description: $desc, color: 5016756, footer: {text: "Fishing Game"}}]}')
          
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$JSON" \
            -v
