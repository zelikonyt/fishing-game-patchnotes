name: Post Patch Notes to Discord

on:
  push:
    paths:
      - 'PatchNotes.txt'

jobs:
  post-to-discord:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          DATE=$(head -n 1 PatchNotes.txt)
          CONTENT=$(tail -n +2 PatchNotes.txt)

          PAYLOAD=$(jq -n \
            --arg title "$DATE" \
            --arg desc "$CONTENT" \
            '{embeds: [{title: $title, description: $desc, color: 5016756, footer: {text: "Fishing Game"}}]}')

          if [ -f last_message.txt ]; then
            LAST_ID=$(sed -n '1p' last_message.txt)
            LAST_DATE=$(sed -n '2p' last_message.txt)

            echo "Last ID: $LAST_ID"
            echo "Last Date: $LAST_DATE"
            echo "Current Date: $DATE"

            if [ "$LAST_DATE" = "$DATE" ]; then
              echo "Same date, deleting old message..."
              DELETE_RESPONSE=$(curl -s -X DELETE "${DISCORD_WEBHOOK}/messages/${LAST_ID}")
              echo "Delete response: $DELETE_RESPONSE"
            else
              echo "Different date, keeping old message"
            fi
          else
            echo "No last_message.txt found, first run"
          fi

          echo "Posting new message..."
          RESPONSE=$(curl -s -X POST "${DISCORD_WEBHOOK}?wait=true" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Response: $RESPONSE"
          NEW_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "New message ID: $NEW_ID"

          echo "$NEW_ID" > last_message.txt
          echo "$DATE" >> last_message.txt

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_message.txt
          git commit -m "Update last message ID"
          git push
